<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="description" content="무지출, 아침 루틴, 번아웃 회복, 혼자 놀기, 커플 대화, 집 정리 생활 실험 생성기"><title>작은실험실 | 나만의 생활 실험 생성기</title><style>
:root{--bg:#fff9ed;--panel:#fff;--ink:#253028;--muted:#718077;--line:#e2e8df;--green:#277a53;--lime:#dff28b;--soft:#f2f7e9}*{box-sizing:border-box}body{margin:0;color:var(--ink);background:radial-gradient(circle at 15% 0,#e7f7ba,transparent 30%),var(--bg);font-family:system-ui,-apple-system,"Segoe UI",sans-serif}button,select,input{font:inherit}header,main{width:min(1020px,calc(100% - 32px));margin:auto}header{padding:22px 0;font-size:21px;font-weight:950;color:var(--green)}.hero{text-align:center;padding:32px 0}.hero h1{margin:0;font-size:clamp(40px,7vw,66px);letter-spacing:-.06em}.hero p{max-width:640px;margin:14px auto;color:var(--muted);line-height:1.7}.builder{padding:clamp(20px,4vw,32px);background:var(--panel);border:1px solid var(--line);border-radius:19px;box-shadow:0 18px 55px rgba(48,82,58,.09)}.fields{display:grid;grid-template-columns:2fr 1fr 1fr;gap:12px}.field{display:grid;gap:7px}label{font-size:13px;font-weight:850}select,input{width:100%;height:49px;padding:0 12px;color:var(--ink);background:#fff;border:1px solid #d5ddd3;border-radius:9px}.generate{width:100%;min-height:52px;margin-top:16px;color:#fff;background:var(--green);border:0;border-radius:10px;font-weight:900;cursor:pointer}.result{display:none;margin:22px 0 70px}.result.show{display:block}.result-head{display:flex;justify-content:space-between;align-items:center;gap:15px;padding:25px;background:var(--green);color:#fff;border-radius:17px 17px 0 0}.result-head h2{margin:0;font-size:clamp(25px,4vw,36px)}.result-head p{margin:6px 0 0;color:#d8f2e4}.reset{padding:9px 12px;color:#184b34;background:#fff;border:0;border-radius:8px;font-weight:800;cursor:pointer}.days{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:20px;background:#f5f8f0;border:1px solid var(--line);border-top:0;border-radius:0 0 17px 17px}.day{position:relative;padding:20px 18px 18px 56px;background:#fff;border:1px solid var(--line);border-radius:12px}.day input{position:absolute;left:17px;top:20px;width:24px;height:24px;accent-color:var(--green)}.day:has(input:checked){opacity:.6}.day:has(input:checked) h3{text-decoration:line-through}.day h3{margin:0 0 7px;font-size:17px}.day p{margin:0;color:var(--muted);line-height:1.55;font-size:14px}.rule{grid-column:1/-1;padding:16px 18px;color:#536047;background:var(--soft);border-radius:10px;line-height:1.55}.share{grid-column:1/-1;min-height:45px;color:var(--green);background:#fff;border:1px solid #bdd2c3;border-radius:9px;font-weight:850;cursor:pointer}@media(max-width:720px){.fields,.days{grid-template-columns:1fr}.result-head{display:block}.reset{margin-top:15px}.rule,.share{grid-column:auto}}
</style></head><body><header>작은실험실</header><main><section class="hero"><h1>인생을 바꾸지 말고<br>며칠만 실험해 보세요</h1><p>목표와 성향에 맞는 작은 행동을 만들고, 부담 없이 체크하며 나에게 맞는 루틴인지 확인하세요.</p></section><section class="builder"><div class="fields"><div class="field"><label for="topic">실험 주제</label><select id="topic"><option value="spend">무지출 챌린지</option><option value="morning">아침 루틴</option><option value="burnout">번아웃 회복</option><option value="solo">주말 혼자 놀기</option><option value="couple">커플 대화 미션</option><option value="clean">집 정리 챌린지</option></select></div><div class="field"><label for="days">기간</label><select id="days"><option value="3">3일</option><option value="5">5일</option><option value="7" selected>7일</option></select></div><div class="field"><label for="level">강도</label><select id="level"><option value="easy">가볍게</option><option value="normal" selected>적당히</option><option value="hard">확실하게</option></select></div></div><button class="generate" id="generate">내 생활 실험 만들기</button></section><section class="result" id="result"><div class="result-head"><div><h2 id="title"></h2><p id="subtitle"></p></div><button class="reset" id="reset">다시 만들기</button></div><div class="days" id="dayList"></div></section></main><script>
const data={spend:{name:"무지출",rule:"필수 교통비와 이미 결제한 비용은 실패로 치지 않습니다. 소비 충동을 발견하는 것이 목적입니다.",tasks:["오늘 필요한 것과 사고 싶은 것을 두 칸으로 나눠 적기","배달앱과 쇼핑앱 알림을 끄고 집에 있는 재료로 한 끼 만들기","커피·간식 없이 물과 집에 있는 음료로 보내기","무료 산책 코스를 정해 30분 걷기","장바구니 상품을 삭제하지 말고 24시간 보류하기","이번 주 새로 나간 돈을 항목별로 돌아보기","아낀 금액의 일부를 저축 계좌로 옮기기"]},morning:{name:"아침 루틴",rule:"완벽한 기상 시간보다 일어난 뒤 첫 30분의 순서를 반복하는 데 집중합니다.",tasks:["기상 후 물 한 잔과 창문 열기","휴대폰보다 먼저 5분 스트레칭하기","오늘 꼭 끝낼 한 가지를 종이에 적기","10분 산책 또는 햇빛 받기","단백질이 포함된 아침 챙기기","알람을 방에서 손이 닿지 않는 곳에 두기","가장 효과가 좋았던 행동 2개만 다음 주에 남기기"]},burnout:{name:"번아웃 회복",rule:"생산성을 회복하려고 애쓰기보다 자극과 의무를 줄이는 실험입니다. 증상이 지속되면 전문가와 상담하세요.",tasks:["오늘 하지 않아도 되는 일 세 가지 지우기","20분 동안 목적 없이 쉬고 죄책감 관찰하기","가장 피로하게 만드는 연락 한 가지 미루기","햇빛을 받으며 20분 천천히 걷기","수면 전 한 시간 업무 알림 끄기","도움을 요청할 사람 한 명에게 현재 상태 말하기","회복을 방해한 것과 도운 것을 각각 두 가지 적기"]},solo:{name:"혼자 놀기",rule:"사진이나 성과를 남기지 않아도 됩니다. 혼자 있을 때 편안한 활동을 발견하는 것이 목적입니다.",tasks:["가보지 않은 동네에서 음료 한 잔 마시기","이어폰 없이 공원 30분 걷기","작은 전시·서점·도서관 한 곳 방문하기","먹고 싶던 메뉴를 혼자 천천히 먹기","한 시간 동안 손으로 만드는 취미 시도하기","휴대폰을 가방에 넣고 영화 한 편 보기","다시 하고 싶은 혼자 활동 순위 정하기"]},couple:{name:"커플 대화",rule:"상대의 답을 평가하거나 바로 해결하려 하지 말고, 각자 5분씩 끊지 않고 듣습니다.",tasks:["요즘 가장 고마웠던 순간 하나씩 말하기","서로의 이번 달 스트레스 점수를 묻기","함께 쓰는 돈에서 바꾸고 싶은 점 말하기","각자 혼자 보내고 싶은 시간의 양 이야기하기","싸울 때 하지 않았으면 하는 행동 하나씩 정하기","다음 달 함께 하고 싶은 작은 계획 세우기","이번 대화에서 새로 알게 된 점 말하기"]},clean:{name:"집 정리",rule:"수납용품을 먼저 사지 않습니다. 매일 정한 구역 하나만 끝내고 다른 곳으로 확장하지 않습니다.",tasks:["현관에서 버릴 것 10개 찾기","냉장고 유통기한 지난 음식 비우기","옷장 한 칸에서 1년간 안 입은 옷 분리하기","책상 위 물건을 모두 내리고 필요한 것만 올리기","욕실의 빈 용기와 오래된 제품 버리기","서랍 하나를 비우고 종류별로 다시 넣기","기부·판매·폐기 봉투를 오늘 집 밖으로 내보내기"]}};
const extras={spend:["지갑 없이 동네 한 바퀴 걷고 사고 싶었던 것 기록하기","냉동실의 가장 오래된 재료로 새 메뉴 만들기","구독 서비스 목록에서 이번 달 안 쓴 것 하나 해지하기","친구와 물건을 사지 않는 무료 약속 잡기","중고로 팔 물건 세 개 사진 찍어 올리기","하루 동안 광고를 볼 때마다 화면을 닫고 이유 기록하기","편의점에 들어가지 않는 새로운 귀가 경로 찾기","소비 대신 통장 잔액이 늘었을 때 할 작은 보상 정하기"],morning:["눈 뜨자마자 좋아하는 노래 한 곡 듣기","아침에 떠오른 생각을 세 문장만 손으로 쓰기","평소보다 15분 일찍 일어나 아무것도 하지 않기","찬물로 손과 얼굴을 씻고 호흡 열 번 세기","침구를 정리한 뒤 오늘의 기분에 이름 붙이기","아침 뉴스 대신 짧은 글 한 편 읽기","출근 전에 가장 어려운 일 5분만 시작하기","전날 밤 아침 옷과 가방을 준비해 결정 하나 줄이기"],burnout:["모든 알림을 두 시간 끄고 조용한 장소에 있기","해야 할 일 목록을 절반으로 접어 보이지 않게 하기","따뜻한 음식을 천천히 먹으며 화면 보지 않기","가장 안전하다고 느끼는 사람에게 도움 한 가지 요청하기","오늘의 에너지를 10점 만점으로 표시하고 그만큼만 일하기","성과와 무관한 손 쓰는 활동 20분 해보기","잠들기 전 내일의 걱정을 종이에 쓰고 서랍에 넣기","하루 한 번 아무 이유 없이 밖의 하늘 사진 찍기"],solo:["동네 지도에서 눈 감고 찍은 장소까지 걸어가기","천 원짜리 물건 하나로 혼자만의 기념품 만들기","카페에서 주변 사람의 대화를 상상해 짧은 이야기 쓰기","평소 안 듣는 장르의 공연 영상 한 편 보기","시장이나 오래된 골목에서 가장 흥미로운 간판 찾기","혼자 노래방에서 처음 부르는 노래 세 곡 도전하기","도서관에서 제목만 보고 책 한 권 골라 20쪽 읽기","나에게 엽서를 써서 한 달 뒤 열어보기"],couple:["서로의 어린 시절 최애 간식을 바꿔 사오기","상대가 요즘 포기한 작은 일을 하나 묻기","휴대폰 없이 20분 산책하며 질문 하나만 이어가기","서로가 생각하는 완벽한 휴일을 예산 없이 설계하기","상대의 장점을 제3자에게 소개하듯 말하기","갈등 때 필요한 시간을 신호 단어로 정하기","함께 찍은 사진 한 장을 골라 그날 기억 비교하기","서로 바라는 애정 표현을 구체적인 행동으로 하나 요청하기"],clean:["집에서 가장 설명하기 어려운 물건 다섯 개 골라보기","사진을 찍어야 기억할 수 있는 물건은 사진만 남기기","모든 가방 속 내용물을 한곳에 모아 중복 제거하기","유통기한 없는 물건에도 내가 정한 사용 기한 붙이기","바닥에 놓인 물건만 골라 원래 주소 만들기","한 서랍을 비운 채로 하루 유지해 보기","집 안의 케이블을 전부 모아 기기 이름표 붙이기","손님이 10분 뒤 온다고 가정하고 한 구역만 정리하기"]};Object.entries(extras).forEach(([key,tasks])=>data[key].tasks.push(...tasks));
const levelText={easy:"하루 10분",normal:"하루 20~30분",hard:"하루 45분"},topicSelect=document.getElementById("topic"),daysSelect=document.getElementById("days"),levelSelect=document.getElementById("level"),generateButton=document.getElementById("generate");
const randomButton=document.createElement("button");randomButton.type="button";randomButton.textContent="완전 랜덤 실험 뽑기";randomButton.style.cssText="width:100%;min-height:48px;margin-top:9px;color:#277a53;background:#f2f7e9;border:1px solid #bdd2c3;border-radius:10px;font-weight:900;cursor:pointer";generateButton.after(randomButton);
const shuffle=list=>[...list].sort(()=>Math.random()-.5);
function build(random=false){if(random){const keys=Object.keys(data);topicSelect.value=keys[Math.floor(Math.random()*keys.length)];daysSelect.value=["3","5","7"][Math.floor(Math.random()*3)];levelSelect.value=["easy","normal","hard"][Math.floor(Math.random()*3)]}const topic=data[topicSelect.value],count=Number(daysSelect.value),level=levelSelect.value,tasks=shuffle(topic.tasks).slice(0,count);document.getElementById("title").textContent=`${count}일 ${topic.name} 실험`;document.getElementById("subtitle").textContent=`${levelText[level]} · 매번 새롭게 조합된 계획`;const list=document.getElementById("dayList");list.innerHTML=`<div class="rule"><strong>실험 규칙</strong><br>${topic.rule}</div>`;tasks.forEach((task,i)=>list.insertAdjacentHTML("beforeend",`<label class="day"><input type="checkbox"><h3>DAY ${i+1}</h3><p>${level==="hard"?`도전 확장: ${task} + 느낀 점 세 줄 기록`:level==="easy"?task.replace(/30분|45분|한 시간/g,"10분"):task}</p></label>`));list.insertAdjacentHTML("beforeend",'<button class="share" id="copyPlan">계획 복사하기</button>');document.getElementById("copyPlan").addEventListener("click",async e=>{const text=[`${count}일 ${topic.name} 실험`,...Array.from(list.querySelectorAll(".day p"),(p,i)=>`${i+1}일차: ${p.textContent}`)].join("\n");await navigator.clipboard.writeText(text);e.target.textContent="복사됨"});document.getElementById("result").classList.add("show");document.getElementById("result").scrollIntoView({behavior:"smooth"})}
generateButton.addEventListener("click",()=>build(false));randomButton.addEventListener("click",()=>build(true));document.getElementById("reset").addEventListener("click",()=>{document.getElementById("result").classList.remove("show");scrollTo({top:0,behavior:"smooth"})});
window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-6L1HM4ZCGD');const googleTag=document.createElement('script');googleTag.async=true;googleTag.src='https://www.googletagmanager.com/gtag/js?id=G-6L1HM4ZCGD';document.head.appendChild(googleTag);
</script></body></html>
