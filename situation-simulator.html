<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="description" content="독립, 퇴사, 창업, 동거, 프리랜서 전향 이후를 미리 보는 상황 시뮬레이터">
  <title>만약에 | 내 상황 시뮬레이터</title>
  <style>
    :root{--bg:#09101c;--panel:#111c2c;--panel2:#17253a;--line:#2b3a51;--text:#f2f6fb;--muted:#93a2b8;--green:#43d39e;--yellow:#ffc857;--red:#ff647c;--blue:#60a5fa}*{box-sizing:border-box}body{margin:0;color:var(--text);background:radial-gradient(circle at 50% 0,#182b46 0,transparent 34%),var(--bg);font-family:system-ui,-apple-system,"Segoe UI",sans-serif}button,textarea{font:inherit}
    header{width:min(1080px,calc(100% - 32px));margin:auto;padding:22px 0;display:flex;justify-content:space-between;align-items:center}.logo{font-weight:950;font-size:22px}.logo span{color:var(--green)}.tag{color:var(--muted);font-size:12px}
    main{width:min(1080px,calc(100% - 32px));margin:28px auto 80px}.hero{text-align:center}.hero h1{margin:0;font-size:clamp(40px,7vw,70px);letter-spacing:-.06em}.hero p{max-width:670px;margin:15px auto 30px;color:var(--muted);line-height:1.7;font-size:17px}
    .input-card{padding:clamp(18px,4vw,30px);background:rgba(17,28,44,.94);border:1px solid var(--line);border-radius:20px;box-shadow:0 25px 80px rgba(0,0,0,.25)}label{display:block;margin-bottom:10px;font-weight:850}textarea{width:100%;min-height:125px;resize:vertical;padding:17px;color:var(--text);background:#0c1624;border:1px solid #34445c;border-radius:12px;outline:none;line-height:1.6}textarea:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(67,211,158,.12)}
    .examples{display:flex;gap:7px;flex-wrap:wrap;margin:12px 0 18px}.example{padding:7px 11px;color:var(--muted);background:transparent;border:1px solid var(--line);border-radius:999px;cursor:pointer}.example:hover{color:var(--text);border-color:#65758d}.run{width:100%;min-height:54px;color:#062219;background:linear-gradient(135deg,#64e6b5,#34be8b);border:0;border-radius:11px;font-weight:950;font-size:17px;cursor:pointer}
    .results{display:none;margin-top:28px}.results.show{display:block}.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:13px}.metric{padding:22px;background:var(--panel);border:1px solid var(--line);border-radius:15px}.metric span{color:var(--muted);font-size:13px}.metric strong{display:block;margin-top:8px;font-size:clamp(25px,4vw,38px)}.risk-low{color:var(--green)}.risk-mid{color:var(--yellow)}.risk-high{color:var(--red)}
    .grid{display:grid;grid-template-columns:1.05fr .95fr;gap:14px;margin-top:14px}.box{padding:24px;background:var(--panel);border:1px solid var(--line);border-radius:15px}.box h2{margin:0 0 16px;font-size:19px}.problem{padding:17px;color:#ffd7de;background:rgba(255,100,124,.1);border-left:4px solid var(--red);border-radius:8px;line-height:1.55}.actions{display:grid;gap:10px;margin:0;padding:0;list-style:none;counter-reset:item}.actions li{padding:13px 13px 13px 45px;position:relative;background:var(--panel2);border-radius:9px;line-height:1.5}.actions li:before{counter-increment:item;content:counter(item);position:absolute;left:12px;top:12px;display:grid;place-items:center;width:23px;height:23px;color:#062219;background:var(--green);border-radius:50%;font-weight:900;font-size:12px}
    .timeline{display:grid;grid-template-columns:repeat(6,1fr);gap:7px}.month{min-height:78px;padding:9px 6px;display:grid;align-content:center;text-align:center;background:var(--panel2);border-radius:8px}.month b{font-size:12px}.month span{margin-top:5px;color:var(--muted);font-size:11px}.month.danger{outline:1px solid var(--red);background:rgba(255,100,124,.09)}.assumptions{margin-top:14px;padding:16px 18px;color:var(--muted);background:#0c1624;border:1px dashed #35465f;border-radius:11px;font-size:13px;line-height:1.65}.disclaimer{text-align:center;margin-top:18px;color:var(--muted);font-size:12px}
    @media(max-width:720px){.summary,.grid{grid-template-columns:1fr}.timeline{grid-template-columns:repeat(3,1fr)}.tag{display:none}}
  </style>
</head>
<body>
  <header><div class="logo"><span>만약에</span> 시뮬레이터</div><div class="tag">결정하기 전에 1년을 먼저 살아보세요</div></header>
  <main><section class="hero"><h1>내 선택 이후엔<br>무슨 일이 생길까?</h1><p>현재 상황과 고민을 편하게 적으면 앞으로의 위험 구간, 버틸 수 있는 기간과 먼저 준비할 일을 계산합니다.</p></section>
    <section class="input-card"><label for="situation">상황을 구체적으로 입력하세요</label><textarea id="situation" placeholder="예: 저축 1,200만 원이고 월 생활비는 180만 원이야. 지금 퇴사하면 6개월 버틸 수 있을까?"></textarea><div class="examples"><button class="example" data-text="월급 280만 원, 월세 70만 원이고 저축은 1000만 원이면 독립 가능할까?">독립</button><button class="example" data-text="저축 1200만 원, 월 생활비 180만 원인데 지금 퇴사하면 6개월 버틸 수 있을까?">퇴사</button><button class="example" data-text="자본금 5000만 원으로 카페 창업하면 몇 개월 버틸 수 있을까? 월 고정비는 900만 원 예상해.">카페 창업</button><button class="example" data-text="연애 중인데 월세 100만 원인 집에서 동거하면 생활비 갈등이 어디서 생길까?">동거</button><button class="example" data-text="저축 1500만 원, 현재 월급 350만 원인데 프리랜서로 전향하면 첫 1년은 어떨까?">프리랜서</button></div><button class="run" id="run" type="button">앞으로 1년 시뮬레이션</button></section>
    <section class="results" id="results"><div class="summary"><div class="metric"><span>종합 위험도</span><strong id="risk">-</strong></div><div class="metric"><span>예상 생존 기간</span><strong id="survival">-</strong></div><div class="metric"><span>감지된 상황</span><strong id="type">-</strong></div></div><div class="grid"><article class="box"><h2>가장 먼저 터질 문제</h2><div class="problem" id="problem"></div></article><article class="box"><h2>지금 할 행동 3개</h2><ol class="actions" id="actions"></ol></article><article class="box" style="grid-column:1/-1"><h2>12개월 예상 흐름</h2><div class="timeline" id="timeline"></div><div class="assumptions" id="assumptions"></div></article></div><p class="disclaimer">이 결과는 입력 문장에서 추출한 값과 일반화된 가정으로 만든 참고용 시뮬레이션이며 재무·법률·사업 자문이 아닙니다.</p></section>
  </main>
  <script>
    const input=document.getElementById("situation"),won=n=>`${Math.round(n).toLocaleString("ko-KR")}만 원`;
    function amount(text,words,fallback){for(const word of words){const a=new RegExp(`${word}[^0-9]{0,12}([0-9,]+)\\s*만`).exec(text),b=new RegExp(`([0-9,]+)\\s*만[^가-힣]{0,6}${word}`).exec(text);const match=a||b;if(match)return Number(match[1].replaceAll(",",""))}return fallback}
    function detect(text){if(/카페|창업|매장/.test(text))return"cafe";if(/프리랜서|프리랜/.test(text))return"freelance";if(/동거/.test(text))return"cohabit";if(/퇴사/.test(text))return"quit";return"independence"}
    const configs={
      independence:{name:"독립",problem:"주거비를 내고 난 뒤 남는 돈이 예상보다 적어 비정기 지출이 생기는 순간 저축이 멈출 가능성이 큽니다.",actions:["월세·관리비를 합친 주거비를 월소득의 30% 아래로 맞추기","이사비와 보증금을 제외한 비상금 6개월분 확보하기","독립 전 두 달 동안 예상 생활비만 남기고 미리 살아보기"]},
      quit:{name:"퇴사",problem:"소득이 끊긴 3개월 차부터 구직 기간이 길어질지 모른다는 불안 때문에 원하지 않는 조건을 수락할 가능성이 커집니다.",actions:["건드리지 않을 비상금과 구직 기간 생활비를 계좌로 분리하기","퇴사 전 건강보험·세금·대출 상환액까지 월지출에 포함하기","3개월·6개월 시점의 구직 기준과 플랜 B를 미리 정하기"]},
      cafe:{name:"카페 창업",problem:"초기 매출보다 임대료·인건비·재료 폐기 같은 고정적인 현금 유출이 먼저 누적될 가능성이 큽니다.",actions:["보증금과 인테리어비를 제외한 운영자금 6개월분 남기기","예상 매출을 70%로 낮춘 보수적 손익표 만들기","계약 전 같은 상권의 시간대별 유동인구와 객단가 직접 측정하기"]},
      cohabit:{name:"동거",problem:"월세보다 식비·생활용품·가사노동처럼 매번 기준이 달라지는 비용과 역할에서 갈등이 먼저 생길 가능성이 큽니다.",actions:["공동비·개인비 항목과 부담 비율을 문서로 정하기","청소·요리·장보기 담당과 빈도를 구체적으로 나누기","계약 명의, 보증금 지분과 헤어질 경우 정산 방법 정하기"]},
      freelance:{name:"프리랜서",problem:"첫 계약의 지연보다 대금 입금 시점의 불규칙성과 세금·보험료를 빼놓는 현금흐름 착시가 먼저 문제가 됩니다.",actions:["생활비 9개월분과 세금 계좌를 따로 확보하기","퇴사 전에 반복 계약 고객 또는 최소 매출 한 곳 만들기","매출의 20%를 세금·보험료 몫으로 즉시 분리하기"]}
    };
    function simulate(){const text=input.value.trim();if(!text){input.focus();return}const kind=detect(text),config=configs[kind],salary=amount(text,["월급","월소득","수입"],kind==="freelance"?350:280),rent=amount(text,["월세","주거비"],70),saving=amount(text,["저축","자본금","비상금"],kind==="cafe"?5000:1000),expense=amount(text,["생활비","월지출","고정비"],kind==="cafe"?900:180);let monthly=expense,risk=50,survival=saving/monthly,first=config.problem;
      if(kind==="independence"){monthly=rent+110;const surplus=salary-monthly;risk=Math.max(15,Math.min(92,55-surplus/salary*75+(saving<monthly*6?20:0)));survival=surplus>=0?Infinity:saving/-surplus}
      if(kind==="quit"){risk=Math.max(20,Math.min(95,82-survival*5))}
      if(kind==="cafe"){const operating=Math.max(0,saving*.62),burn=expense*.35;survival=operating/burn;risk=Math.max(35,Math.min(96,88-survival*3))}
      if(kind==="cohabit"){monthly=rent+140;risk=58;survival=Infinity}
      if(kind==="freelance"){monthly=expense;survival=saving/monthly;risk=Math.max(28,Math.min(92,78-survival*4))}
      const rounded=Math.round(risk),riskEl=document.getElementById("risk");riskEl.textContent=`${rounded} / 100`;riskEl.className=rounded<40?"risk-low":rounded<70?"risk-mid":"risk-high";document.getElementById("survival").textContent=Number.isFinite(survival)?`${Math.max(1,Math.floor(survival))}개월`:"현금흐름 유지";document.getElementById("type").textContent=config.name;document.getElementById("problem").textContent=first;document.getElementById("actions").innerHTML=config.actions.map(a=>`<li>${a}</li>`).join("");
      const timeline=document.getElementById("timeline");timeline.innerHTML="";for(let m=1;m<=12;m++){const danger=Number.isFinite(survival)&&m>survival;const phase=kind==="freelance"?(m<4?"수입 적응기":m<8?"고객 확보기":"안정화 시도"):kind==="cafe"?(m<3?"초기 유입":m<7?"재방문 검증":"운영 안정화"):kind==="cohabit"?(m<3?"규칙 형성":m<7?"갈등 조정":"생활 정착"):(danger?"비상금 소진":m<4?"초기 적응":m<7?"지출 압박":"장기 계획");timeline.insertAdjacentHTML("beforeend",`<div class="month ${danger?"danger":""}"><b>${m}개월</b><span>${phase}</span></div>`)}
      document.getElementById("assumptions").innerHTML=`<strong>이번 계산의 가정</strong><br>월소득 ${won(salary)} · 월세 ${won(rent)} · 보유자금 ${won(saving)} · 월지출/고정비 ${won(expense)}<br>입력에서 찾지 못한 값은 일반적인 예시값을 사용했습니다. 정확한 결과를 위해 문장에 금액을 함께 적어주세요.`;document.getElementById("results").classList.add("show");document.getElementById("results").scrollIntoView({behavior:"smooth",block:"start"})}
    document.getElementById("run").addEventListener("click",simulate);document.querySelectorAll("[data-text]").forEach(button=>button.addEventListener("click",()=>{input.value=button.dataset.text;simulate()}));
  </script>
</body>
</html>
