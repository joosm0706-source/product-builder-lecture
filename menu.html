<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>오늘 뭐 먹지? | 메뉴 추천</title>
  <style>
    :root { color-scheme: dark; --bg:#0d1116; --glow:#29313b; --panel:rgba(23,29,36,.94); --slot:rgba(0,0,0,.3); --soft:rgba(255,255,255,.06); --line:rgba(255,255,255,.13); --text:#f5efe3; --muted:#aaa69e; --accent:#ffd37a; }
    :root[data-theme="light"] { color-scheme:light; --bg:#f3eee4; --glow:#fff7df; --panel:rgba(255,255,255,.94); --slot:#f3eee5; --soft:rgba(80,55,20,.06); --line:rgba(55,38,16,.18); --text:#292116; --muted:#746958; --accent:#b96d00; }
    * { box-sizing:border-box; }
    body { min-height:100vh; margin:0; display:grid; place-items:center; padding:24px; color:var(--text); background:radial-gradient(circle at 50% 12%,var(--glow) 0,transparent 38%),var(--bg); font-family:system-ui,-apple-system,"Segoe UI",sans-serif; transition:color .2s,background .2s; }
    main { width:min(760px,100%); padding:clamp(22px,5vw,42px); border:1px solid var(--line); border-radius:18px; background:var(--panel); box-shadow:0 30px 90px rgba(0,0,0,.28); }
    .top { display:flex; justify-content:space-between; align-items:flex-start; gap:18px; }
    h1 { margin:0 0 8px; font-size:clamp(30px,6vw,52px); }
    p { margin:0; color:var(--muted); line-height:1.6; }
    .top-actions { display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
    .back { flex:none; color:var(--text); text-decoration:none; padding:9px 12px; border:1px solid var(--line); border-radius:9px; }
    .slots { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:30px 0 16px; }
    .slot { min-height:130px; display:grid; place-items:center; overflow:hidden; border:1px solid var(--line); border-radius:14px; background:var(--slot); }
    .slot span { padding:12px; text-align:center; font-size:clamp(24px,5vw,36px); font-weight:900; }
    .slot.spinning span { animation:spin .1s linear infinite; }
    @keyframes spin { 0%{transform:translateY(-14px);opacity:.4} 50%{transform:none;opacity:1} 100%{transform:translateY(14px);opacity:.4} }
    .actions { display:flex; gap:10px; flex-wrap:wrap; }
    button { appearance:none; min-height:48px; padding:0 20px; border:1px solid rgba(255,255,255,.18); border-radius:10px; color:#17120a; background:linear-gradient(#ffd37a,#e6a53d); font-weight:900; cursor:pointer; }
    button.secondary { color:var(--text); background:var(--soft); border-color:var(--line); }
    button:disabled { opacity:.55; cursor:wait; }
    .result { min-height:96px; margin-top:18px; padding:18px; border:1px solid var(--line); border-radius:12px; color:var(--muted); background:var(--soft); line-height:1.6; }
    .result strong { display:block; margin-bottom:4px; color:var(--text); font-size:22px; }
    .chips { display:flex; flex-wrap:wrap; gap:7px; margin-top:16px; }
    .chip { min-height:38px; padding:6px 12px; border:1px solid var(--line); border-radius:999px; color:var(--muted); background:var(--soft); font-size:13px; }
    .chip[aria-pressed="true"] { color:#17120a; border-color:var(--accent); background:var(--accent); box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 20%,transparent); }
    @media (max-width:560px) { body{padding:12px} main{padding:20px}.top{display:block}.top-actions{justify-content:flex-start;margin-top:14px}.slots{grid-template-columns:1fr;margin-top:22px}.slot{min-height:96px}.actions button{flex:1} }
  </style>
</head>
<body>
  <main>
    <div class="top">
      <div><h1>오늘 뭐 먹지?</h1><p>음식 종류를 먼저 고르고, 그 안에서 오늘의 메뉴를 추천합니다.</p></div>
      <div class="top-actions"><button class="secondary" id="themeButton" type="button">라이트 모드</button><a class="back" href="index.html">게임으로 돌아가기</a></div>
    </div>
    <div class="slots">
      <div class="slot"><span id="categorySlot">종류 슬롯</span></div>
      <div class="slot"><span id="dishSlot">메뉴 슬롯</span></div>
    </div>
    <div class="actions">
      <button id="spinButton" type="button">슬롯 돌리기</button>
      <button class="secondary" id="quickButton" type="button">바로 추천</button>
    </div>
    <div class="result" id="result" aria-live="polite"><strong>메뉴를 골라드립니다</strong>버튼을 누르면 카테고리와 메뉴를 차례로 선택합니다.</div>
    <div class="chips" id="categoryButtons" aria-label="음식 카테고리 선택"></div>
  </main>
  <script>
    const categories = [
      { name:"양식", menus:["파스타","스테이크","리조또","버거","피자"] },
      { name:"중식", menus:["마라탕","짜장면","짬뽕","탕수육","양꼬치"] },
      { name:"한식", menus:["김치찌개","비빔밥","제육볶음","순두부찌개","불고기"] },
      { name:"일식", menus:["초밥","라멘","돈카츠","규동","우동"] },
      { name:"동남아", menus:["쌀국수","팟타이","나시고렝","반미","똠얌꿍"] },
      { name:"멕시칸", menus:["타코","부리토","퀘사디아","나초","파히타"] },
      { name:"야식", menus:["치킨","족발","보쌈","곱창","떡볶이"] },
      { name:"고기", menus:["삼겹살","갈비","닭갈비","폭립","바베큐 플래터"] }
    ];
    const categorySlot=document.getElementById("categorySlot"), dishSlot=document.getElementById("dishSlot"), result=document.getElementById("result");
    const spinButton=document.getElementById("spinButton"), quickButton=document.getElementById("quickButton"), slots=[...document.querySelectorAll(".slot")];
    const categoryButtons=document.getElementById("categoryButtons"), themeButton=document.getElementById("themeButton");
    let selectedCategory=null, spinning=false, audioContext=null;
    const pick=list=>list[Math.floor(Math.random()*list.length)];
    const recommend=()=>{const category=selectedCategory||pick(categories);return {category,dish:pick(category.menus)}};
    function show(rec){categorySlot.textContent=rec.category.name;dishSlot.textContent=rec.dish;result.innerHTML=`<strong>${rec.dish}</strong>오늘은 ${rec.category.name} 메뉴인 ${rec.dish} 어떠세요?`;}
    function sound(frequency=320,duration=.035,volume=.035){
      audioContext ||= new (window.AudioContext||window.webkitAudioContext)();
      const oscillator=audioContext.createOscillator(), gain=audioContext.createGain(), now=audioContext.currentTime;
      oscillator.type="square"; oscillator.frequency.setValueAtTime(frequency,now); gain.gain.setValueAtTime(volume,now); gain.gain.exponentialRampToValueAtTime(.001,now+duration);
      oscillator.connect(gain).connect(audioContext.destination); oscillator.start(now); oscillator.stop(now+duration);
    }
    categories.forEach(category=>{
      const button=document.createElement("button"); button.className="chip"; button.type="button"; button.textContent=category.name; button.setAttribute("aria-pressed","false");
      button.addEventListener("click",()=>{
        if(spinning)return; selectedCategory=selectedCategory===category?null:category;
        [...categoryButtons.children].forEach(item=>item.setAttribute("aria-pressed",String(selectedCategory&&item===button)));
        categorySlot.textContent=selectedCategory?selectedCategory.name:"종류 슬롯"; dishSlot.textContent="메뉴 슬롯";
        result.innerHTML=selectedCategory?`<strong>${selectedCategory.name} 선택</strong>이제 슬롯을 돌리면 메뉴 슬롯만 돌아갑니다.`:"<strong>카테고리 선택 해제</strong>슬롯을 돌리면 음식 종류부터 다시 선택합니다.";
        sound(520,.05,.025);
      }); categoryButtons.appendChild(button);
    });
    const savedTheme=localStorage.getItem("menu-theme"); if(savedTheme==="light")document.documentElement.dataset.theme="light";
    function updateThemeLabel(){themeButton.textContent=document.documentElement.dataset.theme==="light"?"다크 모드":"라이트 모드";}
    updateThemeLabel();
    themeButton.addEventListener("click",()=>{const light=document.documentElement.dataset.theme!=="light";document.documentElement.dataset.theme=light?"light":"dark";localStorage.setItem("menu-theme",light?"light":"dark");updateThemeLabel();});
    quickButton.addEventListener("click",()=>show(recommend()));
    spinButton.addEventListener("click",()=>{
      if(spinning)return; spinning=true; spinButton.disabled=quickButton.disabled=true; [...categoryButtons.children].forEach(button=>button.disabled=true); const final=recommend();
      if(selectedCategory){
        categorySlot.textContent=selectedCategory.name; slots[1].classList.add("spinning");
        const dishTimer=setInterval(()=>{dishSlot.textContent=pick(final.category.menus);sound();},80);
        setTimeout(()=>{clearInterval(dishTimer);slots[1].classList.remove("spinning");show(final);sound(720,.12,.06);spinning=false;spinButton.disabled=quickButton.disabled=false;[...categoryButtons.children].forEach(button=>button.disabled=false);},1000);
        return;
      }
      slots[0].classList.add("spinning");
      const categoryTimer=setInterval(()=>{categorySlot.textContent=pick(categories).name;sound(250);},70);
      setTimeout(()=>{clearInterval(categoryTimer);slots[0].classList.remove("spinning");categorySlot.textContent=final.category.name;slots[1].classList.add("spinning");
        const dishTimer=setInterval(()=>{dishSlot.textContent=pick(final.category.menus);sound();},80);
        setTimeout(()=>{clearInterval(dishTimer);slots[1].classList.remove("spinning");show(final);sound(720,.12,.06);spinning=false;spinButton.disabled=quickButton.disabled=false;[...categoryButtons.children].forEach(button=>button.disabled=false);},850);
      },900);
    });
  </script>
</body>
</html>
