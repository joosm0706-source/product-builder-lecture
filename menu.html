<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="google-adsense-account" content="ca-pub-2008012279958185">
  <title>메뉴 슬롯 추천</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2008012279958185"
     crossorigin="anonymous"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #131313;
      --panel: rgba(24, 24, 22, .88);
      --line: rgba(255, 255, 255, .14);
      --text: #fff8eb;
      --muted: #c9bca5;
      --accent: #ffbd4a;
      --red: #e64c3c;
      --green: #57c785;
    }

    * { box-sizing: border-box; }

    html, body {
      min-height: 100%;
      margin: 0;
      background:
        radial-gradient(circle at 22% 16%, rgba(255, 189, 74, .18), transparent 28%),
        radial-gradient(circle at 76% 20%, rgba(230, 76, 60, .16), transparent 26%),
        linear-gradient(145deg, #101010, #201b18 48%, #111);
      color: var(--text);
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      letter-spacing: 0;
    }

    body {
      display: grid;
      place-items: center;
      padding: 28px 14px;
    }

    .app {
      width: min(900px, 100%);
      display: grid;
      gap: 18px;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 7vw, 66px);
      line-height: 1;
    }

    .button {
      appearance: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 10px 16px;
      border: 1px solid rgba(255, 255, 255, .18);
      border-radius: 8px;
      color: #18110a;
      background: linear-gradient(#ffd985, #edaa33);
      box-shadow: 0 12px 26px rgba(255, 189, 74, .24);
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
    }

    .button.secondary {
      color: var(--text);
      background: rgba(255, 255, 255, .07);
      box-shadow: none;
    }

    .machine {
      padding: clamp(16px, 4vw, 30px);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 30px 90px rgba(0, 0, 0, .48);
    }

    .slots {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin: 18px 0;
    }

    .slot {
      min-height: clamp(116px, 20vw, 168px);
      display: grid;
      place-items: center;
      overflow: hidden;
      border: 2px solid rgba(255, 255, 255, .14);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .09), transparent 22%, transparent 78%, rgba(0, 0, 0, .28)),
        #191916;
      box-shadow: inset 0 0 34px rgba(0, 0, 0, .5);
      position: relative;
    }

    .slot::before,
    .slot::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      height: 28%;
      pointer-events: none;
      z-index: 1;
    }

    .slot::before {
      top: 0;
      background: linear-gradient(rgba(0, 0, 0, .55), transparent);
    }

    .slot::after {
      bottom: 0;
      background: linear-gradient(transparent, rgba(0, 0, 0, .55));
    }

    .slot-value {
      width: 100%;
      padding: 14px 8px;
      text-align: center;
      font-size: clamp(24px, 5vw, 44px);
      font-weight: 900;
      color: #fff;
      text-shadow: 0 2px 12px rgba(0, 0, 0, .62);
      white-space: nowrap;
    }

    .slot.spinning .slot-value {
      animation: blurSpin .12s linear infinite;
    }

    @keyframes blurSpin {
      0% { transform: translateY(-18px); opacity: .45; filter: blur(1px); }
      50% { transform: translateY(0); opacity: 1; filter: blur(0); }
      100% { transform: translateY(18px); opacity: .45; filter: blur(1px); }
    }

    .lever-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .result {
      min-height: 114px;
      margin-top: 18px;
      padding: 18px;
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 8px;
      background: rgba(255, 255, 255, .045);
    }

    .result h2 {
      margin: 0 0 8px;
      font-size: clamp(22px, 4vw, 34px);
    }

    .result p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .chip {
      padding: 7px 10px;
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255, 255, 255, .045);
      font-size: 13px;
    }

    @media (max-width: 680px) {
      body { align-items: start; }
      .slots { grid-template-columns: 1fr; }
      .slot { min-height: 98px; }
      .top { align-items: flex-start; }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="top">
      <h1>메뉴 슬롯 추천</h1>
      <a class="button secondary" href="index.html">게임으로 돌아가기</a>
    </div>

    <section class="machine" aria-label="메뉴 추천 슬롯머신">
      <div class="slots">
        <div class="slot"><div class="slot-value" id="slotA">양식</div></div>
        <div class="slot"><div class="slot-value" id="slotB">파스타</div></div>
        <div class="slot"><div class="slot-value" id="slotC">오늘 저녁</div></div>
      </div>

      <div class="lever-row">
        <button class="button" id="spinButton" type="button">슬롯 돌리기</button>
        <button class="button secondary" id="quickButton" type="button">가볍게 추천</button>
      </div>

      <div class="result" id="result" aria-live="polite">
        <h2>오늘 뭐 먹지?</h2>
        <p>슬롯을 돌리면 음식 종류와 구체적인 메뉴를 골라드립니다.</p>
      </div>

      <div class="chips" aria-label="추천 카테고리">
        <span class="chip">양식</span>
        <span class="chip">중식</span>
        <span class="chip">일식</span>
        <span class="chip">동남아</span>
        <span class="chip">분식</span>
        <span class="chip">야식</span>
        <span class="chip">바베큐</span>
      </div>
    </section>
  </main>

  <script>
    (() => {
      "use strict";

      const categories = [
        { name: "양식", menus: ["파스타", "스테이크", "리조또", "버거", "피자"], note: "크림/토마토/오일 중 하나만 정하면 실패 확률이 낮습니다." },
        { name: "중식", menus: ["마라탕", "짜장면", "짬뽕", "탕수육", "양꼬치"], note: "매운맛이 당기면 마라, 든든하게 가려면 면 요리가 좋습니다." },
        { name: "일식", menus: ["초밥", "라멘", "돈카츠", "규동", "우동"], note: "깔끔한 한 끼가 필요하면 일식이 무난합니다." },
        { name: "동남아", menus: ["쌀국수", "팟타이", "나시고렝", "반미", "똠얌꿍"], note: "향신료와 새콤한 맛이 괜찮은 날에 잘 맞습니다." },
        { name: "분식", menus: ["떡볶이", "김밥", "라볶이", "튀김", "순대"], note: "가볍게 먹거나 여러 메뉴를 나눠 먹기 좋습니다." },
        { name: "야식", menus: ["치킨", "족발", "보쌈", "곱창", "닭발"], note: "늦은 시간에는 나눠 먹기 좋은 메뉴가 만족도가 높습니다." },
        { name: "바베큐", menus: ["삼겹살", "폭립", "브리스킷", "닭갈비", "그릴 소시지"], note: "불맛과 고기 위주로 확실하게 배부른 선택입니다." }
      ];

      const moods = ["오늘 저녁", "든든하게", "가볍게", "매콤하게", "친구랑", "배달로", "혼밥으로"];
      const slots = [
        document.getElementById("slotA"),
        document.getElementById("slotB"),
        document.getElementById("slotC")
      ];
      const slotBoxes = [...document.querySelectorAll(".slot")];
      const result = document.getElementById("result");
      const spinButton = document.getElementById("spinButton");
      const quickButton = document.getElementById("quickButton");
      let spinning = false;

      function pick(list) {
        return list[Math.floor(Math.random() * list.length)];
      }

      function recommendation() {
        const category = pick(categories);
        return {
          category,
          menu: pick(category.menus),
          mood: pick(moods)
        };
      }

      function setResult(rec) {
        result.innerHTML = `<h2>${rec.category.name} - ${rec.menu}</h2><p>${rec.mood} 먹기 좋은 선택입니다. ${rec.category.note}</p>`;
      }

      function quickRecommend() {
        const rec = recommendation();
        slots[0].textContent = rec.category.name;
        slots[1].textContent = rec.menu;
        slots[2].textContent = rec.mood;
        setResult(rec);
      }

      function spin() {
        if (spinning) return;
        spinning = true;
        spinButton.disabled = true;
        quickButton.disabled = true;
        slotBoxes.forEach(slot => slot.classList.add("spinning"));

        const timers = slots.map((slot, index) => setInterval(() => {
          const rec = recommendation();
          slot.textContent = index === 0 ? rec.category.name : index === 1 ? rec.menu : rec.mood;
        }, 70 + index * 20));

        const final = recommendation();
        slots.forEach((slot, index) => {
          setTimeout(() => {
            clearInterval(timers[index]);
            slotBoxes[index].classList.remove("spinning");
            slot.textContent = index === 0 ? final.category.name : index === 1 ? final.menu : final.mood;
            if (index === slots.length - 1) {
              setResult(final);
              spinning = false;
              spinButton.disabled = false;
              quickButton.disabled = false;
            }
          }, 900 + index * 520);
        });
      }

      spinButton.addEventListener("click", spin);
      quickButton.addEventListener("click", quickRecommend);
    })();
  </script>
</body>
</html>
