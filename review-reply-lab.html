<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="description" content="별점 1점, 배달 지연, 악성 리뷰와 환불 요구에 대응하는 소상공인 리뷰 답변 생성기"><title>리뷰 답변 연구소</title><style>
:root{--bg:#f5f2ec;--panel:#fff;--ink:#29241d;--muted:#756d62;--line:#e3ddd3;--brand:#b44726;--soft:#fff0e8}*{box-sizing:border-box}body{margin:0;color:var(--ink);background:linear-gradient(145deg,#fff8ed,var(--bg) 38%);font-family:system-ui,-apple-system,"Segoe UI",sans-serif}button,textarea,select,input{font:inherit}header,main{width:min(1040px,calc(100% - 32px));margin:auto}header{padding:22px 0;font-size:21px;font-weight:950;color:var(--brand)}.hero{text-align:center;padding:36px 0 30px}.hero h1{margin:0;font-size:clamp(38px,7vw,66px);letter-spacing:-.06em}.hero p{max-width:650px;margin:14px auto;color:var(--muted);line-height:1.7}.workspace{display:grid;grid-template-columns:1fr 1fr;gap:16px}.panel{padding:clamp(20px,4vw,32px);background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:0 16px 45px rgba(64,48,30,.08)}h2{margin:0 0 20px;font-size:22px}.field{display:grid;gap:7px;margin-bottom:15px}label{font-size:14px;font-weight:850}select,input,textarea{width:100%;padding:12px 13px;color:var(--ink);background:#fff;border:1px solid #d8d0c5;border-radius:9px;outline:none}textarea{min-height:155px;resize:vertical;line-height:1.55}select:focus,input:focus,textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(180,71,38,.1)}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.generate{width:100%;min-height:50px;color:#fff;background:var(--brand);border:0;border-radius:10px;font-weight:900;cursor:pointer}.answer{min-height:250px;padding:18px;white-space:pre-wrap;color:#443b31;background:#fffaf6;border:1px solid #eee2d7;border-radius:11px;line-height:1.75}.placeholder{color:#9c9388}.tools{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:13px}.copy{padding:9px 14px;color:var(--brand);background:var(--soft);border:1px solid #f0cbbb;border-radius:8px;font-weight:800;cursor:pointer}.tip{color:var(--muted);font-size:12px}.principles{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:20px 0 70px}.principle{padding:17px;background:rgba(255,255,255,.66);border:1px solid var(--line);border-radius:12px}.principle b{display:block;margin-bottom:5px;color:var(--brand)}.principle span{color:var(--muted);font-size:13px;line-height:1.5}@media(max-width:720px){.workspace{grid-template-columns:1fr}.principles{grid-template-columns:1fr}.row{grid-template-columns:1fr}}
</style></head><body><header>리뷰 답변 연구소</header><main><section class="hero"><h1>감정은 빼고,<br>신뢰는 남기는 답변</h1><p>고객 리뷰를 붙여 넣고 상황을 선택하세요. 사과, 사실 확인과 재방문 제안이 균형 잡힌 사장님 답변을 만듭니다.</p></section><section class="workspace"><div class="panel"><h2>리뷰 상황 입력</h2><div class="row"><div class="field"><label for="type">리뷰 유형</label><select id="type"><option value="low">별점 1점·불만</option><option value="delay">배달 지연</option><option value="quality">맛·품질 불만</option><option value="hygiene">위생 컴플레인</option><option value="refund">환불 요구</option><option value="malicious">악성·과장 리뷰</option><option value="positive">좋은 리뷰</option></select></div><div class="field"><label for="tone">답변 톤</label><select id="tone"><option value="warm">친절하고 따뜻하게</option><option value="firm">정중하지만 단호하게</option><option value="short">짧고 간결하게</option></select></div></div><div class="field"><label for="store">매장 이름</label><input id="store" placeholder="예: 오늘치킨"></div><div class="field"><label for="review">고객 리뷰</label><textarea id="review" placeholder="고객이 남긴 리뷰 내용을 입력하세요."></textarea></div><button class="generate" id="generate">답변 만들기</button></div><div class="panel"><h2>추천 답변</h2><div class="answer placeholder" id="answer">왼쪽에 리뷰를 입력하면 답변이 여기에 표시됩니다.</div><div class="tools"><span class="tip">공개 답변 전 주문 내역과 사실관계를 확인하세요.</span><button class="copy" id="copy">복사</button></div></div></section><section class="principles"><div class="principle"><b>감정적으로 반박하지 않기</b><span>짧게 공감하고 확인 가능한 사실만 전달합니다.</span></div><div class="principle"><b>개인정보 공개하지 않기</b><span>주문번호, 전화번호와 고객 정보를 답변에 쓰지 않습니다.</span></div><div class="principle"><b>다음 행동 제시하기</b><span>연락 방법이나 개선 조치를 구체적으로 안내합니다.</span></div></section></main><script>
const templates={low:["기대에 미치지 못해 죄송합니다.","남겨주신 내용을 확인해 부족했던 부분을 점검하겠습니다.","같은 불편이 반복되지 않도록 개선하겠습니다."],delay:["예정보다 배달이 늦어져 불편을 드린 점 진심으로 사과드립니다.","조리 및 배달 과정의 지연 원인을 확인하겠습니다.","대기시간 안내를 더 정확히 하고 지연 주문을 우선 점검하겠습니다."],quality:["음식의 맛과 품질로 만족을 드리지 못해 죄송합니다.","남겨주신 의견을 조리 담당자와 확인하겠습니다.","조리 기준과 포장 상태를 다시 점검하겠습니다."],hygiene:["위생과 관련해 걱정을 끼쳐드려 무겁게 받아들이고 있습니다.","해당 시간대의 조리·포장 과정과 매장 위생 상태를 즉시 확인하겠습니다.","확인 결과에 따라 필요한 조치를 진행하고 관리 기준을 강화하겠습니다."],refund:["이용에 불편을 드려 죄송합니다.","환불은 주문 내역과 상품 상태 확인이 필요한 점 양해 부탁드립니다.","매장으로 주문 정보를 알려주시면 기준에 따라 신속히 확인해 안내드리겠습니다."],malicious:["남겨주신 내용은 확인했습니다.","다만 공개된 내용 중 실제 주문 기록과 다른 부분은 정확한 확인이 필요합니다.","매장으로 주문 정보를 알려주시면 사실관계를 확인해 책임 있게 안내드리겠습니다."],positive:["소중한 리뷰와 좋은 평가를 남겨주셔서 감사합니다.","만족하셨다는 말씀에 큰 힘을 얻었습니다.","다음에도 맛과 서비스로 보답하겠습니다."]};
function detectType(review){if(/늦|지연|배달.*오래|도착/.test(review))return"delay";if(/위생|머리카락|이물질|벌레|냄새/.test(review))return"hygiene";if(/환불|취소|돈.*돌려/.test(review))return"refund";if(/맛|짜|싱거|차갑|눅눅|양이|품질/.test(review))return"quality";if(/최악|망해|사기|신고|별로/.test(review))return"malicious";if(/맛있|친절|최고|좋아|재주문/.test(review))return"positive";return"low"}function reviewPoint(review){const clean=review.replace(/\s+/g," ").trim();return clean.length>72?`${clean.slice(0,72)}…`:clean}
const answer=document.getElementById("answer");document.getElementById("generate").addEventListener("click",()=>{const review=document.getElementById("review").value.trim(),store=document.getElementById("store").value.trim()||"저희 매장",selected=document.getElementById("type").value,type=selected==="low"?detectType(review):selected,tone=document.getElementById("tone").value;if(!review){document.getElementById("review").focus();return}let [apology,fact,action]=templates[type],text="",point=reviewPoint(review),reference=`리뷰에서 말씀하신 “${point}” 내용을 확인했습니다.`;if(tone==="short")text=`안녕하세요, ${store}입니다. ${reference} ${apology} ${action}`;else if(tone==="firm")text=`안녕하세요, ${store}입니다.\n\n${reference} ${apology} ${fact} 정확한 확인 없이 단정하기 어려운 부분은 매장으로 주문 정보를 전달해 주시면 확인 후 안내드리겠습니다.\n\n${action} 감사합니다.`;else text=`안녕하세요, ${store}입니다.\n\n먼저 소중한 의견을 남겨주셔서 감사합니다. ${reference} ${apology} ${fact}\n\n${action} 가능하시다면 매장으로 주문 정보를 알려주시면 상황을 더 정확히 확인하고 안내드리겠습니다. 더 나은 경험을 드릴 수 있도록 노력하겠습니다.`;answer.textContent=text;answer.classList.remove("placeholder")});document.getElementById("copy").addEventListener("click",async event=>{if(answer.classList.contains("placeholder"))return;await navigator.clipboard.writeText(answer.textContent);event.target.textContent="복사됨";setTimeout(()=>event.target.textContent="복사",1200)});
window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-6L1HM4ZCGD');const googleTag=document.createElement('script');googleTag.async=true;googleTag.src='https://www.googletagmanager.com/gtag/js?id=G-6L1HM4ZCGD';document.head.appendChild(googleTag);
</script></body></html>
