<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="말하기 어려운 인간관계 문장을 상황과 톤에 맞게 바꿔주는 무료 문장 도구">
  <title>말결 | 인간관계 문장 번역기</title>
  <style>
    :root{--bg:#f6f3ff;--panel:#fff;--ink:#211a32;--muted:#716982;--line:#e6e0ef;--brand:#6d40d8;--brand2:#eee7ff;--shadow:0 18px 60px rgba(63,42,105,.11)}
    *{box-sizing:border-box}body{margin:0;color:var(--ink);background:radial-gradient(circle at 50% 0,#e9deff,transparent 35%),var(--bg);font-family:system-ui,-apple-system,"Segoe UI",sans-serif}button,textarea{font:inherit}
    header{width:min(1080px,calc(100% - 32px));margin:auto;padding:22px 0;display:flex;align-items:center;justify-content:space-between}.logo{font-size:22px;font-weight:950;color:var(--brand)}.badge{padding:7px 10px;color:var(--brand);background:var(--brand2);border-radius:999px;font-size:12px;font-weight:800}
    main{width:min(1080px,calc(100% - 32px));margin:22px auto 80px}.hero{text-align:center;margin-bottom:34px}.hero h1{margin:0 0 12px;font-size:clamp(38px,7vw,68px);letter-spacing:-.06em}.hero p{max-width:680px;margin:auto;color:var(--muted);font-size:17px;line-height:1.7}
    .composer{padding:clamp(20px,4vw,34px);background:var(--panel);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow)}label{display:block;margin-bottom:10px;font-weight:900}.input-wrap{position:relative}textarea{width:100%;min-height:145px;resize:vertical;padding:18px;color:var(--ink);background:#fbfaff;border:1px solid #d8d0e7;border-radius:14px;line-height:1.65;outline:none}textarea:focus{border-color:var(--brand);box-shadow:0 0 0 4px rgba(109,64,216,.11)}.count{position:absolute;right:12px;bottom:10px;color:var(--muted);font-size:12px}
    .examples{display:flex;gap:7px;flex-wrap:wrap;margin:13px 0 20px}.example{min-height:36px;padding:6px 11px;color:var(--muted);background:#faf8ff;border:1px solid var(--line);border-radius:999px;cursor:pointer}.example:hover{color:var(--brand);border-color:#bca8e9}.translate{width:100%;min-height:54px;border:0;border-radius:12px;color:#fff;background:linear-gradient(135deg,#7750df,#5d2fc8);font-weight:900;font-size:17px;cursor:pointer;box-shadow:0 12px 28px rgba(93,47,200,.24)}.translate:active{transform:translateY(1px)}
    .notice{margin:13px 0 0;color:var(--muted);font-size:12px;line-height:1.5}.results{display:none;margin-top:34px}.results.show{display:block}.result-head{display:flex;align-items:end;justify-content:space-between;gap:12px;margin-bottom:15px}.result-head h2{margin:0;font-size:28px}.detected{color:var(--muted);font-size:13px}.cards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.card{position:relative;min-height:190px;padding:22px;background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:0 8px 26px rgba(63,42,105,.06)}.card h3{margin:0 70px 14px 0;color:var(--brand);font-size:17px}.card p{margin:0;white-space:pre-wrap;color:#433a52;line-height:1.7}.copy{position:absolute;right:14px;top:14px;min-height:34px;padding:0 10px;color:var(--muted);background:#faf8ff;border:1px solid var(--line);border-radius:8px;cursor:pointer}.copy.done{color:var(--brand);background:var(--brand2)}footer{text-align:center;padding:0 20px 42px;color:var(--muted);font-size:12px}
    @media(max-width:700px){header{padding-top:16px}.hero{margin-top:12px}.cards{grid-template-columns:1fr}.result-head{display:block}.detected{display:block;margin-top:6px}.card{min-height:0}}
  </style>
</head>
<body>
  <header><div class="logo">말결</div><span class="badge">인간관계 문장 번역기</span></header>
  <main>
    <section class="hero"><h1>하고 싶은 말은 그대로,<br>표현은 더 정확하게</h1><p>거절, 독촉, 요청처럼 꺼내기 어려운 말을 입력하세요. 상황에 맞춰 여섯 가지 톤과 형식으로 정리해 드립니다.</p></section>
    <section class="composer">
      <label for="message">어떤 말을 전하고 싶나요?</label>
      <div class="input-wrap"><textarea id="message" maxlength="500" placeholder="예: 집주인에게 보증금을 약속한 날짜까지 돌려달라고 정중하지만 강하게 말하고 싶어요."></textarea><span class="count" id="count">0 / 500</span></div>
      <div class="examples" aria-label="예시 문장"><button class="example" type="button" data-example="상사한테 이건 제 업무가 아니라고 말하고 싶은데 무례하지 않게 바꿔줘.">업무 범위 거절</button><button class="example" type="button" data-example="집주인에게 보증금을 약속한 날짜까지 돌려달라고 정중하지만 강하게 말하고 싶어.">보증금 반환 요청</button><button class="example" type="button" data-example="거래처가 납품 일정을 계속 미루는데 확답을 달라고 압박하고 싶어.">거래처 일정 독촉</button><button class="example" type="button" data-example="친구에게 빌려준 돈을 이번 주까지 갚아달라고 어색하지 않게 말하고 싶어.">친구에게 상환 요청</button></div>
      <button class="translate" id="translateButton" type="button">톤별 문장 만들기</button><p class="notice">입력한 내용은 서버로 전송하거나 저장하지 않습니다. 법적 분쟁 관련 문구는 참고용이며 전문가의 자문을 대체하지 않습니다.</p>
    </section>
    <section class="results" id="results"><div class="result-head"><h2>추천 문장</h2><span class="detected" id="detected"></span></div><div class="cards" id="cards"></div></section>
  </main>
  <footer>말결은 상대를 공격하기보다 요구사항·기한·다음 행동을 명확히 전달하도록 돕습니다.</footer>
  <script>
    const input=document.getElementById("message"),count=document.getElementById("count"),results=document.getElementById("results"),cards=document.getElementById("cards"),detected=document.getElementById("detected");
    const situations={
      work:{label:"업무 범위 조율",match:/상사|업무|회사|담당|팀장|부장/,texts:{soft:"말씀해 주신 업무를 확인했습니다. 다만 현재 제 담당 범위와 진행 중인 일정상 바로 맡기에는 어려움이 있습니다. 우선순위와 담당 범위를 함께 조율해 주시면 가능한 부분을 확인하겠습니다.",firm:"요청하신 내용은 현재 제 담당 업무 범위에 포함되지 않습니다. 기존 업무 일정에도 영향이 있어 담당자 지정 또는 우선순위 조정이 필요합니다. 확인 후 방향을 정해 주시기 바랍니다.",legal:"요청하신 업무의 담당 범위와 책임 소재를 명확히 하기 위해 업무 지시 내용, 기한, 기존 업무의 우선순위 변경 여부를 서면으로 확인 부탁드립니다.",chat:"요청 주신 건 확인했습니다. 현재 제 담당 범위 밖의 업무라 담당자와 우선순위 조율이 필요합니다. 기존 일정 중 어떤 업무를 조정하면 될지 확인 부탁드립니다.",sms:"요청하신 업무는 현재 제 담당 범위와 달라 조율이 필요합니다. 기존 일정의 우선순위 변경 여부와 담당자를 확인 부탁드립니다.",email:"제목: 요청 업무의 담당 범위 및 우선순위 확인\n\n안녕하세요. 요청해 주신 업무를 확인했습니다. 해당 내용은 현재 제 담당 범위와 차이가 있고 기존 일정에도 영향을 줄 수 있어 담당자와 우선순위 확인이 필요합니다. 진행 방향을 회신해 주시면 그에 맞춰 가능한 부분을 검토하겠습니다. 감사합니다."}},
      deposit:{label:"보증금 반환 요청",match:/집주인|임대인|보증금|전세|월세/,texts:{soft:"안녕하세요. 보증금 반환 일정을 다시 확인드리고자 연락드립니다. 약속된 날짜에 반환될 수 있도록 준비 상황과 정확한 입금 예정일을 알려주시면 감사하겠습니다.",firm:"안녕하세요. 보증금 반환 약정일이 다가와 정확한 입금 일정을 요청드립니다. 약속된 날짜까지 전액 반환해 주시고, 입금 예정일을 오늘 중 회신해 주시기 바랍니다.",legal:"보증금 반환과 관련하여 공식적으로 요청드립니다. 약정된 반환일과 금액을 확인하시어 기한 내 전액 지급해 주시기 바랍니다. 기한 내 반환 또는 구체적인 일정 회신이 없을 경우 필요한 절차를 검토할 예정입니다.",chat:"안녕하세요. 보증금 반환 일정 확인 부탁드립니다. 약속된 날짜까지 전액 입금 가능한지, 정확한 예정일을 오늘 중 알려주세요.",sms:"보증금 반환 일정 확인 요청드립니다. 약속된 날짜까지 전액 입금해 주시고 정확한 입금 예정일을 회신해 주세요.",email:"제목: 보증금 반환 일정 확인 요청\n\n안녕하세요. 보증금 반환과 관련해 정확한 일정을 확인하고자 합니다. 약정된 반환일까지 전액 지급해 주시고, 준비 상황과 입금 예정일을 회신 부탁드립니다. 원활한 처리를 위해 구체적인 날짜를 알려주시기 바랍니다."}},
      vendor:{label:"거래처 일정 독촉",match:/거래처|납품|발주|계약|일정|미루|업체/,texts:{soft:"안녕하세요. 요청드린 건의 진행 상황을 확인하고자 연락드립니다. 내부 일정에 영향이 있어 가능한 완료일을 구체적으로 알려주시면 감사하겠습니다.",firm:"현재 일정이 여러 차례 지연되어 더 이상의 연기는 어렵습니다. 완료 가능한 확정 일자와 세부 진행 상황을 오늘 중 회신해 주시기 바랍니다.",legal:"계약된 일정이 지연되고 있어 이행 계획을 서면으로 요청드립니다. 확정 완료일과 지연 사유를 회신해 주시고, 추가 지연 시 계약 조건에 따른 후속 조치를 검토할 수 있음을 알려드립니다.",chat:"진행 상황 확인 부탁드립니다. 일정이 계속 지연되어 오늘 중 확정 완료일과 현재 진행률을 공유해 주세요.",sms:"요청 건의 일정이 지연되고 있습니다. 오늘 중 확정 완료일과 진행 상황을 회신해 주시기 바랍니다.",email:"제목: 진행 일정 확정 및 회신 요청\n\n안녕하세요. 요청드린 건의 일정이 반복적으로 지연되어 확인 요청드립니다. 내부 후속 일정 확정을 위해 현재 진행 상황과 완료 가능한 확정 일자를 오늘 중 회신해 주시기 바랍니다. 추가 변경이 예상된다면 사유와 대응 계획도 함께 부탁드립니다."}},
      money:{label:"지인 간 상환 요청",match:/친구|지인|빌려|돈|갚|상환/,texts:{soft:"전에 빌려준 돈 때문에 조심스럽게 연락해. 나도 필요한 일정이 있어서 가능하면 이번 주까지 보내줄 수 있을까? 어려운 상황이면 가능한 날짜를 솔직하게 알려줘.",firm:"전에 빌려준 돈은 이번 주까지 상환해 줬으면 해. 전액이 어렵다면 가능한 금액과 나머지 상환 날짜를 구체적으로 알려줘.",legal:"빌려준 금액의 상환을 공식적으로 요청해. 이번 주까지 입금하거나 구체적인 분할 상환 일정에 답해 줘. 회신이나 이행이 없으면 기록을 바탕으로 필요한 절차를 검토할 수밖에 없어.",chat:"전에 빌려준 돈 이번 주까지 가능할까? 전액이 어렵다면 가능한 금액이랑 나머지 갚을 날짜를 정확히 알려줘.",sms:"빌려준 금액 상환 요청해. 이번 주까지 입금 부탁하고, 어렵다면 가능한 금액과 정확한 상환일을 답해 줘.",email:"제목: 대여금 상환 일정 확인\n\n안녕하세요. 이전에 빌려드린 금액의 상환 일정을 확인하고자 합니다. 이번 주까지 상환을 부탁드리며, 전액 상환이 어렵다면 가능한 금액과 잔액의 구체적인 지급 일정을 회신해 주세요."}},
      general:{label:"일반 요청",match:/$^/,texts:null}
    };
    const toneNames={soft:"부드럽게",firm:"단호하게",legal:"분쟁 전 단계처럼",chat:"회사 메신저용",sms:"문자용",email:"이메일용"};
    function generalTexts(text){const core=text.replace(/(바꿔줘|말하고 싶어|말하고 싶은데|써줘)[.!?]?$/g,"").trim();return {soft:`조심스럽게 말씀드립니다. ${core} 이 부분을 함께 확인해 주시면 감사하겠습니다.`,firm:`요청사항을 명확히 전달드립니다. ${core} 확인 후 구체적인 답변과 처리 일정을 알려주시기 바랍니다.`,legal:`해당 사안에 대해 공식적으로 요청드립니다. ${core} 관련 내용과 처리 일정을 서면으로 회신해 주시기 바랍니다. 회신이 없을 경우 필요한 후속 절차를 검토하겠습니다.`,chat:`안녕하세요. ${core} 확인 부탁드립니다. 가능 여부와 일정을 답변해 주세요.`,sms:`${core} 관련해 연락드립니다. 확인 후 가능한 일정과 답변 부탁드립니다.`,email:`제목: 요청사항 확인 및 회신 부탁드립니다\n\n안녕하세요. ${core} 관련하여 요청드립니다. 검토 후 가능 여부와 구체적인 처리 일정을 회신해 주시면 감사하겠습니다.`}}
    function findSituation(text){return Object.values(situations).find(item=>item!==situations.general&&item.match.test(text))||situations.general}
    function cleanIntent(text){return text.replace(/^(나는|제가|저는)\s*/g,"").replace(/(싸가지 없어 보이지 않게|무례하지 않게|정중하지만 강하게|어색하지 않게|부드럽게|단호하게)?\s*(바꿔줘|말하고 싶어|말하고 싶은데|써줘|작성해줘)[.!?]?$/g,"").trim().replace(/[.!?]+$/,"")}
    function personalize(base,intent,key){const point=`구체적으로 말씀드리면, ${intent}에 대한 확인과 답변을 부탁드립니다.`;if(key==="email")return base.replace("감사합니다.",`${point}\n\n감사합니다.`);if(key==="sms")return `${intent} 관련해 연락드립니다. 확인 후 가능한 일정과 답변 부탁드립니다.`;if(key==="chat")return `${intent} 관련하여 확인 요청드립니다. 가능한 방향과 일정을 답변 부탁드립니다.`;return `${base}\n\n${point}`}
    function render(){const text=input.value.trim();if(!text){input.focus();input.setAttribute("aria-invalid","true");return}input.removeAttribute("aria-invalid");const situation=findSituation(text),intent=cleanIntent(text),base=situation.texts||generalTexts(text),generated={};Object.keys(toneNames).forEach(key=>generated[key]=personalize(base[key],intent,key));detected.textContent=`감지된 상황: ${situation.label} · 입력 내용 반영됨`;cards.innerHTML="";Object.entries(toneNames).forEach(([key,name])=>{const card=document.createElement("article");card.className="card";const title=document.createElement("h3");title.textContent=name;const message=document.createElement("p");message.textContent=generated[key];const copy=document.createElement("button");copy.className="copy";copy.type="button";copy.textContent="복사";copy.addEventListener("click",async()=>{await navigator.clipboard.writeText(message.textContent);copy.textContent="복사됨";copy.classList.add("done");setTimeout(()=>{copy.textContent="복사";copy.classList.remove("done")},1400)});card.append(title,copy,message);cards.appendChild(card)});results.classList.add("show");results.scrollIntoView({behavior:"smooth",block:"start"})}
    input.addEventListener("input",()=>count.textContent=`${input.value.length} / 500`);document.getElementById("translateButton").addEventListener("click",render);document.querySelectorAll("[data-example]").forEach(button=>button.addEventListener("click",()=>{input.value=button.dataset.example;input.dispatchEvent(new Event("input"));render()}));
  </script>
</body>
</html>
